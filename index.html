<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I in Thailand?</title>

  <!-- Open Graph / social sharing -->
  <meta property="og:title"       content="Am I in Thailand?">
  <meta property="og:description" content="Find out instantly.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://shaik.github.io/inthailand/">
  <meta property="og:image"       content="https://shaik.github.io/inthailand/preview.png">
  <meta name="twitter:card"       content="summary_large_image">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f9f9f7;
      color: #111;
    }

    main {
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #face {
      width: 160px;
      height: 160px;
    }

    /* Slow mouth morph when revealing result */
    #mouth {
      transition: d 4s cubic-bezier(0.45, 0, 0.55, 1);
    }

    #answer {
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      min-height: 1.2em;
    }

    #note {
      font-size: 0.82rem;
      color: #888;
      max-width: 280px;
      line-height: 1.5;
    }

    button {
      background: none;
      border: 1.5px solid #ccc;
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      font-size: 0.875rem;
      cursor: pointer;
      color: #555;
      transition: border-color 0.15s, color 0.15s;
    }

    button:hover { border-color: #999; color: #111; }

    .hidden { display: none; }

    /* Eyes scan left then right while checking */
    @keyframes look-around {
      0%         { transform: translateX(0); }
      10%        { transform: translateX(5px); }
      40%        { transform: translateX(5px); }
      60%        { transform: translateX(-5px); }
      90%        { transform: translateX(-5px); }
      100%       { transform: translateX(0); }
    }

    .checking .eye {
      animation: look-around 2.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    /* Stagger right eye slightly so they don't move in perfect lockstep */
    .checking #eye-right {
      animation-delay: 0.06s;
    }

    /* Smoothly return eyes to centre when animation is removed */
    .eye {
      transition: transform 0.4s ease;
      transform-box: fill-box;
      transform-origin: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Am I in Thailand?</h1>

    <svg id="face" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle id="eye-left"  class="eye" cx="35" cy="41" r="4" fill="#111"/>
      <circle id="eye-right" class="eye" cx="65" cy="41" r="4" fill="#111"/>
      <path id="mouth" d="M 35 63 Q 50 63 65 63"
            fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </svg>

    <p id="answer" aria-live="polite">Checking…</p>
    <p id="note"   aria-live="polite" class="hidden"></p>
    <button id="retry" class="hidden">Check again</button>
  </main>

  <script>
    const TH = { minLat: 5.5, maxLat: 20.5, minLon: 97.3, maxLon: 105.7 };

    const face   = document.getElementById('face');
    const mouth  = document.getElementById('mouth');
    const answer = document.getElementById('answer');
    const note   = document.getElementById('note');
    const retry  = document.getElementById('retry');

    const MOUTHS = {
      neutral: 'M 35 63 Q 50 63 65 63',
      happy:   'M 35 62 Q 50 75 65 62',
      sad:     'M 35 69 Q 50 57 65 69',
    };

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    // Minimum time to show the "checking" animation before revealing result.
    const MIN_CHECK_MS = 2000;

    function resetFace() {
      // Disable the slow reveal transition while resetting to neutral
      mouth.style.transition = 'none';
      mouth.setAttribute('d', MOUTHS.neutral);
      // Re-enable on next frame so the reset isn't animated
      requestAnimationFrame(() => requestAnimationFrame(() => {
        mouth.style.transition = '';
      }));
    }

    function setChecking() {
      face.classList.add('checking');
      resetFace();
      answer.textContent = 'Checking…';
      note.textContent = '';
      note.classList.add('hidden');
      retry.classList.add('hidden');
    }

    async function reveal(mouthState, answerText, noteText) {
      // 1. Stop eye animation — eyes glide back to centre via CSS transition
      face.classList.remove('checking');

      // 2. Brief pause so eyes settle before anything changes
      await sleep(350);

      // 3. Change text
      answer.textContent = answerText;

      // 4. Tiny gap, then start the slow mouth morph
      await sleep(80);
      mouth.setAttribute('d', MOUTHS[mouthState]);

      // 5. After the morph completes, show supporting note + retry
      await sleep(4200);
      if (noteText) {
        note.textContent = noteText;
        note.classList.remove('hidden');
      }
      retry.classList.remove('hidden');
    }

    function isInThailand(lat, lon) {
      return lat >= TH.minLat && lat <= TH.maxLat &&
             lon >= TH.minLon && lon <= TH.maxLon;
    }

    async function tryGeoIP() {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 6000);
      try {
        const res = await fetch('https://ipapi.co/json/', { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) return null;
        const data = await res.json();
        if (data.country_code) return data.country_code === 'TH';
      } catch {
        clearTimeout(timer);
      }
      return null;
    }

    async function check() {
      setChecking();
      const started = Date.now();

      let inThailand = null;
      let approximate = false;

      // Try browser geolocation
      if (navigator.geolocation) {
        inThailand = await new Promise((resolve) => {
          navigator.geolocation.getCurrentPosition(
            (pos) => resolve(isInThailand(pos.coords.latitude, pos.coords.longitude)),
            ()    => resolve(null),
            { timeout: 8000, maximumAge: 60000 }
          );
        });
      }

      // Fall back to GeoIP if geolocation failed or was denied
      if (inThailand === null) {
        inThailand = await tryGeoIP();
        if (inThailand !== null) approximate = true;
      }

      // Ensure the checking animation plays for at least MIN_CHECK_MS
      const elapsed = Date.now() - started;
      if (elapsed < MIN_CHECK_MS) await sleep(MIN_CHECK_MS - elapsed);

      if (inThailand === null) {
        await reveal('neutral', "Can't tell.", 'Location could not be determined.');
      } else {
        const noteText = approximate ? 'Based on your approximate network location.' : null;
        await reveal(inThailand ? 'happy' : 'sad', inThailand ? 'Yes.' : 'No.', noteText);
      }
    }

    retry.addEventListener('click', check);
    check();
  </script>
</body>
</html>
