<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I in Thailand?</title>

  <!-- Redirect GitHub Pages URL to custom domain -->
  <script>
    if (window.location.hostname === 'shaik.github.io') {
      window.location.replace('https://amiinthailand.com' + window.location.pathname.replace('/inthailand', '') + window.location.search + window.location.hash);
    }
  </script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4FLWL0XLF3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-4FLWL0XLF3');
  </script>

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Open Graph / social sharing -->
  <meta property="og:title"       content="Am I in Thailand?">
  <meta property="og:description" content="Find out instantly.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://amiinthailand.com">
  <meta property="og:image"        content="https://amiinthailand.com/og-image.jpg">
  <meta property="og:image:type"   content="image/jpeg">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:image"       content="https://amiinthailand.com/og-image.jpg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f9f9f7;
      color: #111;
    }

    main {
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #face {
      width: 160px;
      height: 160px;
    }

    /* Slow mouth morph when revealing result */
    #mouth {
      transition: d 4s cubic-bezier(0.45, 0, 0.55, 1);
    }

    #answer {
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      min-height: 1.2em;
    }

    #note {
      font-size: 0.82rem;
      color: #888;
      max-width: 280px;
      line-height: 1.5;
    }

    button {
      background: none;
      border: 1.5px solid #ccc;
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      font-size: 0.875rem;
      cursor: pointer;
      color: #555;
      transition: border-color 0.15s, color 0.15s;
    }

    button:hover { border-color: #999; color: #111; }

    .hidden { display: none; }

    /* Eyes scan left then right while checking */
    @keyframes look-around {
      0%         { transform: translateX(0); }
      10%        { transform: translateX(5px); }
      40%        { transform: translateX(5px); }
      60%        { transform: translateX(-5px); }
      90%        { transform: translateX(-5px); }
      100%       { transform: translateX(0); }
    }

    .checking .eye {
      animation: look-around 2.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    /* Stagger right eye slightly so they don't move in perfect lockstep */
    .checking #eye-right {
      animation-delay: 0.06s;
    }

    /* Smoothly return eyes to centre when animation is removed */
    .eye {
      transition: transform 0.4s ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    /* Staging banner */
    #staging-banner {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #999;
      background: rgba(249, 249, 247, 0.85);
      border-bottom: 1px solid #e0e0de;
      border-radius: 0 0 6px 6px;
      padding: 0.2rem 0.75rem;
      z-index: 50;
      pointer-events: none;
    }

    /* About modal */
    #about-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #about-backdrop.hidden { display: none; }

    #about-panel {
      position: relative;
      background: #f9f9f7;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 1.75rem 1.5rem 1.5rem;
      max-width: 320px;
      width: calc(100% - 2rem);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      text-align: left;
    }

    #about-panel h2 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }
    #about-version, #about-credit { font-size: 0.82rem; color: #555; }

    #about-disclaimer {
      font-size: 0.82rem;
      color: #888;
      line-height: 1.5;
      border-top: 1px solid #eee;
      padding-top: 0.75rem;
    }

    #about-close {
      position: absolute;
      top: 0.75rem;
      right: 0.9rem;
      border: none;
      background: none;
      font-size: 1.2rem;
      color: #999;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      line-height: 1;
    }
    #about-close:hover { color: #111; border-color: transparent; }

    #about-debug-area { display: flex; flex-direction: column; gap: 0.5rem; }
    #about-debug-area.hidden { display: none; }

    #about-debug-pre {
      font-size: 0.7rem;
      line-height: 1.4;
      background: #f0f0ee;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.6rem;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="staging-banner" class="hidden">staging</div>
  <main>
    <h1>Am I in Thailand?</h1>

    <svg id="face" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="touch-action: none; user-select: none;">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle id="eye-left"  class="eye" cx="35" cy="41" r="4" fill="#111"/>
      <circle id="eye-right" class="eye" cx="65" cy="41" r="4" fill="#111"/>
      <path id="mouth" d="M 35 63 Q 50 63 65 63"
            fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </svg>

    <p id="answer" aria-live="polite">Checking…</p>
    <p id="note"   aria-live="polite" class="hidden"></p>
    <button id="share" class="hidden">Share</button>
  </main>

  <!-- About modal -->
  <div id="about-backdrop" class="hidden" role="dialog" aria-modal="true" aria-label="About">
    <div id="about-panel">
      <button id="about-close" aria-label="Close">×</button>
      <h2>Am I in Thailand?</h2>
      <p id="about-version"></p>
      <p id="about-credit">Made by Shai Kfir</p>
      <p id="about-disclaimer">A rigorous independent investigation into your current geographical relationship with Thailand. Results are approximate and non-binding.</p>
      <button id="about-debug-btn">Get Debug Info</button>
      <div id="about-debug-area" class="hidden">
        <pre id="about-debug-pre"></pre>
        <button id="about-copy-btn">Copy</button>
      </div>
    </div>
  </div>

  <script>
    const TH = { minLat: 5.5, maxLat: 20.5, minLon: 97.3, maxLon: 105.7 };

    const face   = document.getElementById('face');
    const mouth  = document.getElementById('mouth');
    const answer = document.getElementById('answer');
    const note   = document.getElementById('note');
    const share = document.getElementById('share');

    // Staging indicator
    if (window.location.hostname === 'staging.amiinthailand.com') {
      document.getElementById('staging-banner').classList.remove('hidden');
    }

    let currentResult = null; // 'yes', 'no', or null

    const VERSION = '1.04';
    let detectionMethod = 'none'; // 'edge' | 'geolocation' | 'geoip' | 'none'
    let geoState   = { available: false, status: 'skipped', lat: null, lon: null };
    let geoipState = { status: 'skipped', country: null };

    const MOUTHS = {
      neutral: 'M 35 63 Q 50 63 65 63',
      happy:   'M 35 62 Q 50 75 65 62',
      sad:     'M 35 69 Q 50 57 65 69',
    };

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    // Minimum time to show the "checking" animation before revealing result.
    const MIN_CHECK_MS = 2000;

    function resetFace() {
      // Disable the slow reveal transition while resetting to neutral
      mouth.style.transition = 'none';
      mouth.setAttribute('d', MOUTHS.neutral);
      // Re-enable on next frame so the reset isn't animated
      requestAnimationFrame(() => requestAnimationFrame(() => {
        mouth.style.transition = '';
      }));
    }

    function setChecking() {
      face.classList.add('checking');
      resetFace();
      answer.textContent = 'Checking…';
      note.textContent = '';
      note.classList.add('hidden');
      share.classList.add('hidden');
    }

    async function reveal(mouthState, answerText, noteText) {
      // 1. Stop eye animation — eyes glide back to centre via CSS transition
      face.classList.remove('checking');

      // 2. Brief pause so eyes settle before anything changes
      await sleep(350);

      // 3. Change text
      answer.textContent = answerText;

      // 4. Tiny gap, then start the slow mouth morph
      await sleep(80);
      mouth.setAttribute('d', MOUTHS[mouthState]);

      // 5. After the morph completes, show supporting note + share
      await sleep(4200);
      if (noteText) {
        note.textContent = noteText;
        note.classList.remove('hidden');
      }
      share.classList.remove('hidden');
    }

    function isInThailand(lat, lon) {
      return lat >= TH.minLat && lat <= TH.maxLat &&
             lon >= TH.minLon && lon <= TH.maxLon;
    }

    function getEdgeCountry() {
      const cc = document.body.getAttribute('data-geo-country');
      return (cc && /^[A-Z]{2}$/.test(cc)) ? cc : null;
    }

    async function tryGeoIP() {
      geoipState.status = 'failed';
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 6000);
      try {
        const res = await fetch('https://ipapi.co/json/', { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) return null;
        const data = await res.json();
        if (data.country_code) {
          geoipState.status  = 'succeeded';
          geoipState.country = data.country_code;
          return data.country_code === 'TH';
        }
      } catch {
        clearTimeout(timer);
      }
      return null;
    }

    async function check() {
      detectionMethod = 'none';
      geoState   = { available: false, status: 'skipped', lat: null, lon: null };
      geoipState = { status: 'skipped', country: null };
      setChecking();
      const started = Date.now();

      let inThailand = null;

      // Step 0: Edge country code injected by Cloudflare Worker (instant, no popup)
      const edgeCountry = getEdgeCountry();
      if (edgeCountry !== null) {
        inThailand = (edgeCountry === 'TH');
        detectionMethod = 'edge';
      }

      // Step 1: Browser geolocation (skipped when edge succeeded)
      if (inThailand === null && navigator.geolocation) {
        geoState.available = true;
        inThailand = await new Promise((resolve) => {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              geoState.status = 'succeeded';
              geoState.lat = pos.coords.latitude;
              geoState.lon = pos.coords.longitude;
              resolve(isInThailand(pos.coords.latitude, pos.coords.longitude));
            },
            (err) => {
              geoState.status = err.code === 1 ? 'denied' : err.code === 3 ? 'timeout' : 'error';
              resolve(null);
            },
            { timeout: 8000, maximumAge: 60000 }
          );
        });
        if (inThailand !== null) detectionMethod = 'geolocation';
      }

      // Step 2: GeoIP fallback (skipped when either earlier step succeeded)
      if (inThailand === null) {
        inThailand = await tryGeoIP();
        if (inThailand !== null) detectionMethod = 'geoip';
      }

      // Ensure the checking animation plays for at least MIN_CHECK_MS
      const elapsed = Date.now() - started;
      if (elapsed < MIN_CHECK_MS) await sleep(MIN_CHECK_MS - elapsed);

      if (inThailand === null) {
        currentResult = null;
        await reveal('neutral', "Can't tell.", 'Location could not be determined.');
      } else {
        currentResult = inThailand ? 'yes' : 'no';
        await reveal(inThailand ? 'happy' : 'sad', inThailand ? 'Yes.' : 'No.', null);
      }
    }

    function collectDebugInfo() {
      const edgeCountry = getEdgeCountry() ?? 'none';
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const isStaging = window.location.hostname === 'staging.amiinthailand.com';
      const answer = currentResult === 'yes' ? 'yes' : currentResult === 'no' ? 'no' : "can't tell";
      const coords = (geoState.lat !== null && geoState.lon !== null)
        ? `${geoState.lat}, ${geoState.lon}` : '—';

      return [
        '=== Am I in Thailand? — Debug Report ===',
        `Generated: ${new Date().toISOString()} (${tz})`,
        `Version:   ${VERSION}`,
        '',
        'RESULT',
        `  Answer:            ${answer}`,
        `  Detection method:  ${detectionMethod}`,
        `  Edge country:      ${edgeCountry}`,
        `  URL:               ${window.location.href}`,
        '',
        'GEOLOCATION',
        `  API available:     ${navigator.geolocation ? 'yes' : 'no'}`,
        `  Status:            ${geoState.status}`,
        `  Coordinates:       ${coords}`,
        '',
        'GEOIP (ipapi.co)',
        `  Status:            ${geoipState.status}`,
        `  Country:           ${geoipState.country ?? '—'}`,
        '',
        'BROWSER',
        `  User agent:        ${navigator.userAgent}`,
        `  Language:          ${navigator.language}`,
        `  Timezone:          ${tz}`,
        `  Online:            ${navigator.onLine ? 'yes' : 'no'}`,
        `  Screen:            ${screen.width} × ${screen.height} @ ${window.devicePixelRatio}`,
        `  Viewport:          ${window.innerWidth} × ${window.innerHeight}`,
        `  Web Share API:     ${navigator.share ? 'available' : 'not available'}`,
        '',
        'ENVIRONMENT',
        `  Facebook IAB:      ${/FBAN|FBAV|FB_IAB|FBIOS|FBSS/.test(navigator.userAgent) ? 'yes' : 'no'}`,
        `  Host:              ${window.location.hostname}`,
        `  Protocol:          ${window.location.protocol}`,
        `  Staging:           ${isStaging ? 'yes' : 'no'}`,
        '=====================================',
      ].join('\n');
    }

    function showAbout() {
      const isStaging = window.location.hostname === 'staging.amiinthailand.com';
      document.getElementById('about-version').textContent = 'v' + VERSION + (isStaging ? ' (staging)' : '');
      document.getElementById('about-debug-area').classList.add('hidden');
      document.getElementById('about-debug-pre').textContent = '';
      document.getElementById('about-copy-btn').textContent = 'Copy';
      document.getElementById('about-backdrop').classList.remove('hidden');
    }

    function hideAbout() {
      document.getElementById('about-backdrop').classList.add('hidden');
    }

    document.getElementById('about-close').addEventListener('click', hideAbout);
    document.getElementById('about-backdrop').addEventListener('click', (e) => {
      if (e.target === document.getElementById('about-backdrop')) hideAbout();
    });
    document.getElementById('about-debug-btn').addEventListener('click', () => {
      document.getElementById('about-debug-pre').textContent = collectDebugInfo();
      document.getElementById('about-debug-area').classList.remove('hidden');
    });
    document.getElementById('about-copy-btn').addEventListener('click', () => {
      const btn = document.getElementById('about-copy-btn');
      navigator.clipboard.writeText(document.getElementById('about-debug-pre').textContent)
        .then(() => { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000); });
    });

    // Long-press on face to open About modal
    const LONG_PRESS_MS = 600;
    let pressTimer = null, pressStartX = 0, pressStartY = 0;

    face.addEventListener('pointerdown', (e) => {
      pressStartX = e.clientX; pressStartY = e.clientY;
      pressTimer = setTimeout(showAbout, LONG_PRESS_MS);
    });

    const cancelPress = (e) => {
      if (e?.type === 'pointermove' && Math.hypot(e.clientX - pressStartX, e.clientY - pressStartY) < 10) return;
      clearTimeout(pressTimer); pressTimer = null;
    };

    face.addEventListener('pointerup',     cancelPress);
    face.addEventListener('pointercancel', cancelPress);
    face.addEventListener('pointermove',   cancelPress);
    face.addEventListener('contextmenu',   (e) => e.preventDefault());

    share.addEventListener('click', () => {
      const url = 'https://amiinthailand.com';
      let text;
      if (currentResult === 'yes') {
        text = "Great news: I've confirmed that I am, in fact, in Thailand. Frankly, this confirms a long-standing suspicion. Check your own Thailand status here:";
      } else if (currentResult === 'no') {
        text = "Bad news: I've just found out that I am not in Thailand. This is upsetting, and possibly spreading. Please check your Thailand status here, and then let's discuss emergency next steps:";
      } else {
        text = "I tried to find out if I'm in Thailand. It didn't go well. Check your own status:";
      }
      if (navigator.share) {
        navigator.share({ text: text, url: url });
      } else {
        navigator.clipboard.writeText(text + ' ' + url).then(() => {
          const orig = share.textContent;
          share.textContent = 'Copied!';
          setTimeout(() => { share.textContent = orig; }, 2000);
        });
      }
    });

    check();
  </script>
</body>
</html>
