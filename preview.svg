<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f9f9f7"/>

  <!-- Neutral face, centred slightly left of middle -->
  <g transform="translate(600, 265)">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#111" stroke-width="9"/>
    <!-- Eyes -->
    <circle cx="-55" cy="-32" r="14" fill="#111"/>
    <circle cx=" 55" cy="-32" r="14" fill="#111"/>
    <!-- Neutral mouth -->
    <path d="M -70 48 Q 0 48 70 48"
          fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="530"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif"
        font-size="62"
        font-weight="600"
        letter-spacing="-1.5"
        fill="#111"
        text-anchor="middle">Am I in Thailand?</text>
</svg>
